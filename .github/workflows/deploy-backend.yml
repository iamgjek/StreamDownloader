name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/ec2/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy FastAPI to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            if [[ -z "$APP_DIR" ]]; then
              APP_DIR="/opt/stream-downloader"
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            sudo APP_USER="${{ secrets.EC2_USER }}" APP_DIR="$APP_DIR" bash deploy/ec2/redeploy-backend.sh
            echo "==> 等待 API 就緒"
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8000/docs >/dev/null; then
                echo "Backend deploy succeeded."
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed: API did not become ready within 60s"
            sudo journalctl -u stream-downloader-api -n 20 --no-pager || true
            exit 1
